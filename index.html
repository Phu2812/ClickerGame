<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clicker Quest - Dark Fantasy</title>
    
    <!-- Firebase SDK (compat — works with regular script tags) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        cinzel: ['Cinzel', 'serif'],
                        inter: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        darkbg: '#0d1117',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="text-white overflow-hidden font-inter bg-[#05000a]">
    
    <!-- Motion Background -->
    <div class="motion-bg fixed inset-0 z-[-2]"></div>

    <!-- Ambient Overlay -->
    <div class="fixed inset-0 bg-gradient-to-b from-[#0a0a14]/80 via-[#100f1c]/60 to-[#050508]/90 z-[-1]"></div>
    
    <div id="notification-container"></div>
    <div id="screen-overlay" class="screen-effect-overlay"></div>
    <div id="particle-container"></div>
    
    <!-- MÀN HÌNH ĐĂNG NHẬP -->
    <div id="login-screen" class="absolute inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-sm bg-black/40 transition-opacity duration-500">
        <div class="glass-panel p-8 w-full max-w-md rounded-2xl border border-purple-500/20 shadow-[0_0_50px_rgba(0,0,0,0.8)] relative overflow-hidden">
            <!-- Decorative Glow -->
            <div class="absolute -top-20 -right-20 w-40 h-40 bg-fuchsia-600/30 blur-3xl rounded-full"></div>
            <div class="absolute -bottom-20 -left-20 w-40 h-40 bg-purple-600/30 blur-3xl rounded-full"></div>
            
            <div class="relative z-10">
                <h1 class="text-4xl font-cinzel font-black text-center mb-2 text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-fuchsia-300 drop-shadow-lg tracking-widest uppercase">
                    Clicker Quest
                </h1>
                <p class="text-center text-gray-400 text-xs mb-8 uppercase tracking-widest font-bold">Bóng Đêm Thức Tỉnh</p>
                
                <form id="auth-form" class="space-y-4" onsubmit="handleAuthSubmit(event)">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider font-bold">Tài khoản</label>
                        <input type="text" id="username-input" class="glass-input w-full px-4 py-3 rounded-lg text-sm" placeholder="Nhập tên tài khoản" required autocomplete="username">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1 uppercase tracking-wider font-bold">Mật khẩu</label>
                        <input type="password" id="password-input" class="glass-input w-full px-4 py-3 rounded-lg text-sm" placeholder="Nhập mật khẩu" required autocomplete="current-password">
                    </div>
                    
                    <div class="flex items-center mt-2 mb-4">
                        <input type="checkbox" id="remember-me" class="w-4 h-4 rounded border-white/10 bg-black/40 text-purple-600 focus:ring-purple-500/50" checked>
                        <label for="remember-me" class="ml-2 text-xs text-gray-400">Ghi nhớ đăng nhập</label>
                    </div>

                    <div id="auth-error" class="text-red-400 text-xs text-center hidden bg-red-900/20 py-2 rounded border border-red-500/20">Lỗi: Sai mật khẩu!</div>

                    <div class="grid grid-cols-2 gap-3 mt-6">
                        <button type="submit" id="btn-login" class="glass-button w-full py-3 rounded-lg text-white font-bold tracking-widest uppercase text-sm bg-purple-900/50 hover:bg-purple-800/80 border border-purple-500/50">
                            Đăng nhập
                        </button>
                        <button type="button" id="btn-register" class="glass-button w-full py-3 rounded-lg text-white font-bold tracking-widest uppercase text-sm border border-fuchsia-500/30 hover:bg-fuchsia-900/30" onclick="handleAuthRegister()">
                            Đăng ký
                        </button>
                    </div>
                    
                    <div class="mt-4 pt-4 border-t border-white/10 text-center">
                        <button type="button" class="text-xs text-gray-500 hover:text-gray-300 transition uppercase tracking-wider font-bold underline decoration-white/20 underline-offset-4" onclick="playOffline()">
                            Chơi Ngoại Tuyến (Không đồng bộ)
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- MÀN HÌNH GAME CHÍNH -->
    <div id="game-screen" class="relative w-screen h-screen flex flex-col md:flex-row transition-opacity duration-500 p-2 md:p-6 gap-2 md:gap-6 hidden">
        
        <!-- LEFT COLUMN: Stats (desktop sidebar / mobile compact top bar) -->
        <div class="flex flex-col gap-2 md:gap-6 w-full md:w-[300px] lg:w-[350px] shrink-0 z-20">
            <!-- Stats Panel -->
            <div class="glass-panel py-1.5 px-3 md:p-6 flex md:flex-col justify-between items-center md:items-start gap-2 md:gap-4 shadow-lg shadow-purple-900/20">
                <div class="flex flex-col w-full text-center md:text-left">
                    <span id="level-display" class="text-sm sm:text-base md:text-3xl font-cinzel font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-fuchsia-500 tracking-wider">Level 1</span>
                    <div class="h-[1px] w-full bg-gradient-to-r from-purple-500/50 via-fuchsia-500/50 to-transparent my-4 hidden md:block"></div>
                    
                    <div class="flex md:flex-col gap-2 md:gap-4 justify-around w-full">
                        <div class="stat-item flex items-center justify-between md:bg-white/5 md:p-3 md:rounded-lg md:border md:border-white/5">
                            <span class="text-gray-400 hidden md:block font-semibold text-xs uppercase tracking-widest">Vàng</span>
                            <span id="gold-display" class="text-yellow-400 font-bold drop-shadow-md flex items-center gap-1 text-xs sm:text-sm md:text-lg"><i class="fa-solid fa-coins text-yellow-500"></i> 0</span>
                        </div>
                        <div class="stat-item flex items-center justify-between md:bg-white/5 md:p-3 md:rounded-lg md:border md:border-white/5">
                            <span class="text-gray-400 hidden md:block font-semibold text-xs uppercase tracking-widest">Gems</span>
                            <span id="gem-display" class="text-cyan-400 font-bold drop-shadow-md flex items-center gap-1 text-xs sm:text-sm md:text-lg"><i class="fa-solid fa-gem text-cyan-500"></i> 0</span>
                        </div>
                        <div class="stat-item flex items-center justify-between md:bg-white/5 md:p-3 md:rounded-lg md:border md:border-white/5">
                            <span class="text-gray-400 hidden md:block font-semibold text-xs uppercase tracking-widest">Sát thương</span>
                            <span id="click-damage-display" class="text-red-400 font-bold drop-shadow-md flex items-center gap-1 text-xs sm:text-sm md:text-lg"><i class="fa-solid fa-burst text-red-500"></i> 1</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Skills Panel -->
            <div id="skill-bar-container" class="glass-panel p-6 hidden md:flex flex-col justify-center items-center gap-4 w-full shadow-lg shadow-blue-900/20">
                <h3 class="font-cinzel text-blue-300 text-xl w-full text-center border-b border-blue-500/30 pb-3 tracking-widest font-bold">Kỹ Năng (Phím 1-3)</h3>
                <div class="flex flex-col gap-4 w-full">
                    <div id="skill-slot-0" class="skill-slot w-full h-16 flex items-center justify-center relative" onclick="activateSkillFromSlot(0)" oncontextmenu="unequipSkill(0); return false;">
                        <i class="fas fa-plus"></i><div class="skill-cooldown-overlay"></div><span class="skill-keybind">1</span>
                    </div>
                    <div id="skill-slot-1" class="skill-slot w-full h-16 flex items-center justify-center relative" onclick="activateSkillFromSlot(1)" oncontextmenu="unequipSkill(1); return false;">
                        <i class="fas fa-plus"></i><div class="skill-cooldown-overlay"></div><span class="skill-keybind">2</span>
                    </div>
                    <div id="skill-slot-2" class="skill-slot w-full h-16 flex items-center justify-center relative" onclick="activateSkillFromSlot(2)" oncontextmenu="unequipSkill(2); return false;">
                        <i class="fas fa-plus"></i><div class="skill-cooldown-overlay"></div><span class="skill-keybind">3</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- CENTER COLUMN: Monster Area -->
        <div class="flex flex-col items-center justify-start md:justify-center flex-shrink-0 md:flex-grow md:shrink relative md:min-h-0 z-10">
            <button id="pause-button" class="absolute top-0 right-2 p-1.5 md:p-3 rounded-full text-gray-400 hover:text-white hover:bg-white/10 transition z-50 text-base md:text-xl border border-white/10 backdrop-blur-md bg-black/20" title="Tạm dừng">
                <i class="fa-solid fa-pause"></i>
            </button>
            
            <div class="flex flex-col items-center">
                <h2 id="monster-name" class="text-lg sm:text-2xl md:text-5xl font-cinzel font-black mb-1 md:mb-6 text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.8)] tracking-widest uppercase text-center">Slime</h2>
                
                <div class="w-48 sm:w-56 md:w-[450px] h-4 sm:h-5 md:h-8 glass-panel rounded-full mb-2 md:mb-12 relative overflow-hidden border border-red-900/50 shadow-[0_0_15px_rgba(220,38,38,0.3)]">
                    <div id="health-bar-fill" class="h-full bg-gradient-to-r from-red-900 via-red-600 to-red-400 relative transition-all duration-300 ease-out" style="width: 100%;">
                        <div class="absolute top-0 right-0 bottom-0 w-8 bg-gradient-to-l from-white/40 to-transparent blur-sm"></div>
                    </div>
                    <span id="hp-text" class="absolute inset-0 flex items-center justify-center font-bold text-white text-[10px] sm:text-xs md:text-sm drop-shadow-[0_2px_2px_rgba(0,0,0,0.8)] font-inter tracking-widest"></span>
                </div>
                
                <div class="relative flex items-center justify-center">
                    <!-- Glow: desktop only -->
                    <div class="hidden md:block absolute bottom-[-10px] w-64 h-16 bg-fuchsia-900/40 blur-2xl rounded-[100%] shadow-[0_0_60px_rgba(217,70,239,0.3)] mix-blend-screen pointer-events-none"></div>
                    <div class="magic-circle hidden md:block absolute bottom-[-40px] w-64 h-24 border border-purple-500/20 rounded-[100%] pointer-events-none"></div>
                    
                    <div id="monster-container" class="relative cursor-pointer flex items-center justify-center hover:scale-105 active:scale-95 transition-transform duration-100 md:w-80 md:h-80" onclick="handleMonsterClick(event)">
                        <i id="monster-icon" class="monster-icon fas fa-frog drop-shadow-[0_0_40px_rgba(255,255,255,0.3)]"></i>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- MOBILE SKILL BAR (inline) -->
        <div class="md:hidden w-full glass-panel rounded-xl px-3 py-1.5 flex justify-center items-center gap-3 shrink-0 z-20">
             <div id="mobile-skill-slot-0" class="skill-slot !w-11 !h-11 sm:!w-14 sm:!h-14 !rounded-full relative" onclick="activateSkillFromSlot(0)" oncontextmenu="unequipSkill(0); return false;">
                 <i class="fas fa-plus text-base sm:text-xl"></i><div class="skill-cooldown-overlay !rounded-full"></div>
             </div>
             <div id="mobile-skill-slot-1" class="skill-slot !w-11 !h-11 sm:!w-14 sm:!h-14 !rounded-full relative" onclick="activateSkillFromSlot(1)" oncontextmenu="unequipSkill(1); return false;">
                 <i class="fas fa-plus text-base sm:text-xl"></i><div class="skill-cooldown-overlay !rounded-full"></div>
             </div>
             <div id="mobile-skill-slot-2" class="skill-slot !w-11 !h-11 sm:!w-14 sm:!h-14 !rounded-full relative" onclick="activateSkillFromSlot(2)" oncontextmenu="unequipSkill(2); return false;">
                 <i class="fas fa-plus text-base sm:text-xl"></i><div class="skill-cooldown-overlay !rounded-full"></div>
             </div>
        </div>

        <!-- RIGHT COLUMN: Upgrades & Shop -->
        <div class="glass-panel flex flex-col w-full md:w-[400px] lg:w-[450px] flex-1 md:flex-grow-0 min-h-0 md:h-full shrink-0 overflow-hidden relative z-30 shadow-lg shadow-black/50">
            <!-- Tabs Header -->
            <div class="flex border-b border-white/10 bg-black/40 backdrop-blur-md">
                <button class="tab-button flex-1 py-2 sm:py-3 md:py-4 px-1 rounded-none text-[10px] sm:text-xs md:text-sm font-bold text-gray-400 hover:text-gray-200 transition-all duration-300 relative uppercase tracking-wider font-cinzel" onclick="showTab('upgrade')">Nâng cấp</button>
                <button class="tab-button flex-1 py-2 sm:py-3 md:py-4 px-1 rounded-none text-[10px] sm:text-xs md:text-sm font-bold text-gray-400 hover:text-cyan-300 transition-all duration-300 relative uppercase tracking-wider font-cinzel" onclick="showTab('gem-shop')">Cửa hàng</button>
                <button class="tab-button flex-1 py-2 sm:py-3 md:py-4 px-1 rounded-none text-[10px] sm:text-xs md:text-sm font-bold text-gray-400 hover:text-purple-300 transition-all duration-300 relative uppercase tracking-wider font-cinzel" onclick="showTab('album')">Album</button>
            </div>

            <!-- Tabs Content Area -->
            <div class="flex-grow relative overflow-hidden bg-black/20">
                <!-- Upgrade Tab -->
                <div id="upgrade-tab" class="tab-content absolute inset-0 flex flex-col">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-1 p-1.5 md:p-3 bg-white/5 border-b border-white/5">
                        <button class="sub-tab-button w-full py-1 md:py-2 rounded text-[9px] md:text-xs font-bold text-gray-400 hover:text-white transition-colors border border-transparent uppercase tracking-wider" onclick="showSubTab('click-upgrades')">Cá nhân</button>
                        <button class="sub-tab-button w-full py-1 md:py-2 rounded text-[9px] md:text-xs font-bold text-gray-400 hover:text-white transition-colors border border-transparent uppercase tracking-wider" onclick="showSubTab('dps-upgrades')">Đồng minh</button>
                        <button class="sub-tab-button w-full py-1 md:py-2 rounded text-[9px] md:text-xs font-bold text-gray-400 hover:text-white transition-colors border border-transparent uppercase tracking-wider" onclick="showSubTab('economy-upgrades')">Kinh tế</button>
                        <button class="sub-tab-button w-full py-1 md:py-2 rounded text-[9px] md:text-xs font-bold text-gray-400 hover:text-white transition-colors border border-transparent uppercase tracking-wider" onclick="showSubTab('skill-upgrades')">Tuyệt kỹ</button>
                    </div>
                    
                    <div class="flex-grow overflow-y-auto scroll-container p-2 md:p-4">
                        <div id="click-upgrades" class="sub-tab-content grid grid-cols-1 gap-4"></div>
                        <div id="dps-upgrades" class="sub-tab-content hidden grid grid-cols-1 gap-4"></div>
                        <div id="economy-upgrades" class="sub-tab-content hidden grid grid-cols-1 gap-4"></div>
                        <div id="skill-upgrades" class="sub-tab-content hidden grid grid-cols-1 gap-4"></div>
                    </div>
                </div>

                <!-- Gem Shop Tab -->
                <div id="gem-shop-tab" class="tab-content absolute inset-0 overflow-y-auto scroll-container p-2 md:p-4 hidden">
                    <div id="gem-upgrades-container" class="grid grid-cols-1 gap-4"></div>
                </div>
                
                <!-- Album Tab -->
                <div id="album-tab" class="tab-content absolute inset-0 flex flex-col hidden">
                    <div class="flex flex-wrap p-3 gap-2 bg-white/5 border-b border-white/5">
                        <button class="filter-button flex-shrink-0 px-4 py-2 rounded-md text-xs font-bold whitespace-nowrap text-white bg-white/10" onclick="filterAlbums('all')">All</button>
                        <button class="filter-button flex-shrink-0 px-4 py-2 rounded-md text-xs font-bold whitespace-nowrap text-gray-400 hover:bg-white/5" onclick="filterAlbums('Common')">Common</button>
                        <button class="filter-button flex-shrink-0 px-4 py-2 rounded-md text-xs font-bold whitespace-nowrap text-blue-400 hover:bg-blue-900/30" onclick="filterAlbums('Rare')">Rare</button>
                        <button class="filter-button flex-shrink-0 px-4 py-2 rounded-md text-xs font-bold whitespace-nowrap text-purple-400 hover:bg-purple-900/30" onclick="filterAlbums('Epic')">Epic</button>
                        <button class="filter-button flex-shrink-0 px-4 py-2 rounded-md text-[10px] md:text-xs font-bold whitespace-nowrap text-yellow-400 hover:bg-yellow-900/30" onclick="filterAlbums('Legendary')">Legendary</button>
                    </div>
                    <div class="flex-grow overflow-y-auto scroll-container p-2 md:p-4">
                        <div id="album-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-4"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- PAUSE MENU -->
    <div id="pause-menu" class="fixed inset-0 backdrop-blur-md bg-black/70 hidden items-center justify-center transition-opacity duration-300 z-50">
        <div class="glass-panel p-8 border border-purple-500/20 shadow-[0_0_60px_rgba(0,0,0,0.9)] text-center max-w-sm w-full mx-4 relative overflow-hidden">
            <!-- Glow accent -->
            <div class="absolute -top-16 left-1/2 -translate-x-1/2 w-32 h-32 bg-purple-600/20 blur-3xl rounded-full pointer-events-none"></div>

            <div class="text-5xl mb-4"><i class="fas fa-pause text-purple-400 drop-shadow-[0_0_20px_rgba(168,85,247,0.8)]"></i></div>
            <h2 class="text-3xl font-cinzel font-black text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-fuchsia-300 mb-1">TẠM DỪNG</h2>
            <p id="pause-username-display" class="text-xs text-gray-500 uppercase tracking-widest mb-6 font-bold"></p>

            <div class="space-y-3">
                <button class="w-full py-4 glass-button font-bold text-base uppercase tracking-widest text-green-300 border-green-500/30 hover:border-green-400/60 hover:bg-green-900/30" onclick="resumeGame()">
                    <i class="fas fa-play mr-2"></i>Tiếp tục
                </button>
                <button class="w-full py-4 glass-button font-bold text-base uppercase tracking-widest" onclick="saveGame(); showNotification('Game đã được lưu!', 'info')">
                    <i class="fas fa-floppy-disk mr-2"></i>Lưu game
                </button>
                <div class="border-t border-white/10 my-1"></div>
                <button class="w-full py-4 glass-button font-bold text-base uppercase tracking-widest text-red-400 border-red-500/30 hover:border-red-400/60 hover:bg-red-900/30" onclick="exitGame()">
                    <i class="fas fa-right-from-bracket mr-2"></i>Đăng xuất
                </button>
            </div>
        </div>
    </div>

    
    <div id="zoom-popup" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden items-center justify-center transition-opacity duration-500 z-[100]">
        <div class="relative p-2 glass-panel border border-white/10">
            <img id="zoom-image" src="" alt="Zoomed image" class="max-w-screen-sm max-h-screen-md object-contain rounded-lg">
            <button class="absolute -top-4 -right-4 p-3 rounded-full bg-red-600/80 text-white hover:bg-red-500 transition-all border border-red-400/50 shadow-lg" onclick="closeZoomPopup()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <div id="equip-skill-modal" class="fixed inset-0 bg-black/90 backdrop-blur-sm hidden items-center justify-center transition-opacity duration-500 z-[100]">
        <div class="p-8 glass-panel shadow-2xl text-center space-y-8 max-w-md w-full border border-purple-500/30">
            <h2 class="text-2xl font-cinzel font-bold text-purple-300">TRANG BỊ KỸ NĂNG</h2>
            <p class="text-gray-400 text-sm">Chọn một ô để lắp kỹ năng này</p>
            <div id="modal-skill-slots" class="flex justify-center items-center gap-6"></div>
            <button class="w-full p-4 bg-red-900/50 hover:bg-red-800 border border-red-500/30 rounded-lg transition-all font-bold tracking-widest uppercase mt-4" onclick="closeEquipModal()">Hủy bỏ</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/cloud.js"></script>
    <script src="js/state.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/combat.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
